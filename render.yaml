services:
  - type: web
    name: yourplace-chatbot-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api_server:app --workers 1 --timeout 180 --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: DB_PATH
        value: /tmp/vector_db
      - key: PYTHONUNBUFFERED
        value: "1"
